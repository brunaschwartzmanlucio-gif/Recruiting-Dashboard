<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruiting Dashboard — Bruna</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0D0F;color:#F0EDE8;font-size:13px;min-height:100vh}
.hdr{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;background:#141416}
.hdr h1{font-size:20px;font-weight:500;color:#F0EDE8;font-style:italic}.hdr h1 span{color:#9B87D4}
.hdr-sub{font-size:10px;color:#888;margin-top:2px;letter-spacing:0.06em;text-transform:uppercase}
.stats{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.stat{text-align:right}.stat-n{font-size:20px;font-weight:600;color:#9B87D4;line-height:1}.stat-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-top:1px}
.sdiv{width:1px;height:24px;background:rgba(255,255,255,0.1)}
.new-btn{padding:6px 14px;border-radius:8px;border:1px solid #9B87D4;background:transparent;color:#9B87D4;cursor:pointer;font-size:12px}
.new-btn:hover{background:rgba(155,135,212,0.15)}
.prog-wrap{padding:8px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;background:#141416}
.prog-lbl{font-size:10px;color:#888;min-width:76px}.prog-track{flex:1;height:3px;background:#1C1C1F;border-radius:2px;overflow:hidden}.prog-fill{height:100%;border-radius:2px;background:#9B87D4;transition:width 0.4s}.prog-pct{font-size:10px;color:#9B87D4;min-width:28px;text-align:right}
.layout{display:flex}
.sidebar{width:170px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);padding:14px 0;background:#141416;min-height:calc(100vh - 80px)}
.ss{padding:0 10px;margin-bottom:14px}.ss-title{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px;padding:0 3px}
.sb{display:flex;align-items:center;gap:7px;width:100%;padding:5px 7px;border-radius:6px;background:none;border:none;cursor:pointer;color:#B0ADA8;font-size:11px;text-align:left;margin-bottom:1px}
.sb:hover,.sb.on{background:#1C1C1F;color:#F0EDE8}.sb .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.sb .cnt{margin-left:auto;font-size:9px;color:#888;background:#0D0D0F;padding:1px 5px;border-radius:8px}
.main{flex:1;padding:16px 20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sec-title{font-size:15px;font-weight:500}.sec-sub{font-size:10px;color:#888;margin-top:1px}.sec-cnt{font-size:10px;color:#888;background:#1C1C1F;padding:2px 8px;border-radius:10px}
.tasks{display:flex;flex-direction:column;gap:5px;margin-bottom:24px}
.card{background:#141416;border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:10px 12px;display:flex;align-items:flex-start;gap:9px;transition:opacity 0.2s,border-color 0.15s}
.card:hover{border-color:rgba(255,255,255,0.15)}.card.done{opacity:0.35}
.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.25);background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all 0.15s;user-select:none;-webkit-user-select:none}
.cb:hover{border-color:#9B87D4}.cb.on{background:#9B87D4;border-color:#9B87D4;color:#fff}
.body{flex:1;min-width:0}
.top-row{display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.ttl{font-size:13px;font-weight:500;line-height:1.4;color:#F0EDE8}.ttl.done{text-decoration:line-through;color:#888}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:0.04em;white-space:nowrap;text-transform:uppercase}
.desc{font-size:11.5px;color:#B0ADA8;line-height:1.5;margin-top:1px}
.dur-row{display:flex;align-items:center;gap:7px;margin-top:5px}.dur-track{flex:1;height:2px;background:#1C1C1F;border-radius:1px}.dur-fill{height:100%;border-radius:1px;background:#9B87D4;opacity:0.4}.dur-lbl{font-size:9px;color:#888;white-space:nowrap}
.note-box{margin-top:5px;font-size:10px;color:#9B87D4;background:rgba(155,135,212,0.08);border-left:2px solid #9B87D4;padding:4px 8px;border-radius:0 4px 4px 0}
.act-row{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.act-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#B0ADA8;cursor:pointer}
.act-btn:hover{border-color:#9B87D4;color:#9B87D4}.act-btn.del:hover{border-color:#E05C5C;color:#E05C5C}
.dl{margin-left:auto;font-size:9px;color:#888}.dl.urg{color:#E05C5C}.dl.mid{color:#D4943A}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#141416;border:1px solid rgba(255,255,255,0.15);border-radius:12px;width:100%;max-width:460px;padding:22px;max-height:90vh;overflow-y:auto}
.m-title{font-size:16px;font-weight:500;color:#F0EDE8;margin-bottom:3px}.m-sub{font-size:11px;color:#B0ADA8;margin-bottom:14px}
.m-task{background:#1C1C1F;border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:7px 11px;font-size:12px;color:#9B87D4;font-style:italic;margin-bottom:14px}
.m-label{display:block;font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;margin-top:12px}
.m-select,.m-input,.m-textarea{width:100%;background:#1C1C1F;border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#F0EDE8;font-family:-apple-system,sans-serif;font-size:12px;padding:7px 10px;outline:none;-webkit-appearance:none;appearance:none}
.m-textarea{resize:vertical;min-height:65px}
.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.m-cancel{padding:7px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#B0ADA8;cursor:pointer;font-size:12px}
.m-confirm{padding:7px 14px;border-radius:7px;border:none;background:#9B87D4;color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.chip{padding:4px 9px;border-radius:5px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#B0ADA8;cursor:pointer;font-size:11px}
.chip.on{border-color:#4CAF8A;color:#4CAF8A;background:rgba(76,175,138,0.08)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.toast-el{position:fixed;bottom:20px;right:20px;background:#1C1C1F;border:1px solid rgba(255,255,255,0.15);border-radius:9px;padding:10px 16px;font-size:12px;color:#F0EDE8;z-index:200;display:none}
.empty{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-el" id="toast-el"></div>
<script>
const TASKS=[
  {id:1,phase:'jun-jul',cat:'leitura',title:'Terminar Why Men Love Bitches',desc:'Já começou — fechar antes do semestre. Leitura leve, ideal para a viagem.',urgency:'high',deadline:'Jul 31',duration:4,dt:'único'},
  {id:2,phase:'jun-jul',cat:'cv',title:'Refinar CV com action words',desc:'Cada bullet: verbo forte + métrica. Usar CV da Martina como referência. Sem frases passivas.',urgency:'high',deadline:'Jul 15',duration:3,dt:'único'},
  {id:3,phase:'jun-jul',cat:'tecnico',title:'Terminar curso de Excel',desc:'Fechar o curso antes de agosto. Excel avançado (pivot, VLOOKUP, index/match) é esperado em qualquer entrevista técnica.',urgency:'high',deadline:'Jul 31',duration:12,dt:'único'},
  {id:4,phase:'jun-jul',cat:'tecnico',title:'Basic accounting — 3 statements',desc:'Income statement, balance sheet, cash flow — como se conectam. CFI tem módulo gratuito.',urgency:'high',deadline:'Jul 31',duration:6,dt:'único'},
  {id:5,phase:'jun-jul',cat:'tecnico',title:'Basic valuation (DCF, comps)',desc:'Entender a lógica de DCF, trading comps e precedent transactions. BIWS tem intro grátis.',urgency:'high',deadline:'Jul 31',duration:8,dt:'único'},
  {id:6,phase:'jun-jul',cat:'programas',title:'Pesquisar diversity & women programs',desc:'GS Possibilities, JPM Launching Leaders, MS Early Insights, Citi Early ID, Girls Who Invest.',urgency:'high',deadline:'Jul 15',duration:2,dt:'único'},
  {id:7,phase:'jun-jul',cat:'networking',title:'Iniciar networking — brasileiros em IB',desc:'LinkedIn: Wharton + Brasil + banco alvo. 5 mensagens por semana, curtas e diretas.',urgency:'high',deadline:'Contínuo',duration:1,dt:'semanal'},
  {id:8,phase:'jun-jul',cat:'networking',title:'Contato via Martina → Safra',desc:'Pedir intro diretamente. Mensagem curta, contexto claro, proposta de 20 min.',urgency:'high',deadline:'Esta semana',duration:0.5,dt:'único'},
  {id:9,phase:'agosto',cat:'leitura',title:'Começar Investment Banking (Rosenbaum)',desc:'Foca caps. 1–4: valuation, DCF, LBO basics. Lê em paralelo com Know Theory.',urgency:'mid',deadline:'Ago 1',duration:3,dt:'semanal'},
  {id:10,phase:'agosto',cat:'tecnico',title:'Know Theory Finance — 30 questões',desc:'Mínimo 30 questões antes dos calls. Foco: accounting + valuation básico.',urgency:'mid',deadline:'Ago 15',duration:5,dt:'único'},
  {id:11,phase:'agosto',cat:'networking',title:'Coffee chats — 3 por semana',desc:'Calls com contatos do LinkedIn. Perguntas prontas. Objetivo: aparecer antes do semestre.',urgency:'mid',deadline:'Ago 1',duration:2,dt:'semanal'},
  {id:12,phase:'agosto',cat:'cv',title:'Mock interviews com Career Services',desc:'Agendar antes do semestre. Behavioral + technicals básicos. Falar em voz alta.',urgency:'mid',deadline:'Ago 20',duration:2,dt:'único'},
  {id:13,phase:'agosto',cat:'cv',title:'Montar tracker de programas e deadlines',desc:'Planilha: programa, banco, deadline, status, contato. Cadastrar no Coffee Chat by Adventis.',urgency:'mid',deadline:'Ago 1',duration:2,dt:'único'},
  {id:14,phase:'agosto',cat:'cv',title:'Otimizar LinkedIn para recruiting',desc:'Headline clara, summary com narrative, experiências alinhadas com IB. Antes dos calls.',urgency:'mid',deadline:'Ago 10',duration:3,dt:'único'},
  {id:15,phase:'agosto',cat:'clubes',title:'Aplicar: WUREC + WITG Accelerator',desc:'Confirmar datas de aplicação de agosto. São os dois clubes mais estratégicos.',urgency:'mid',deadline:'Ago',duration:3,dt:'único'},
  {id:16,phase:'agosto',cat:'cv',title:'Banco de histórias STAR',desc:'Riza, CBRE, Vai Vencer: 2-3 histórias cada no formato Situation-Task-Action-Result.',urgency:'mid',deadline:'Ago 20',duration:4,dt:'único'},
  {id:17,phase:'agosto',cat:'cv',title:'Adicionar Tri Delta ao CV',desc:'Sororities têm peso em recruiting. Se tiver cargo dentro da Tri Delta, destacar.',urgency:'mid',deadline:'Ago 10',duration:0.5,dt:'único'},
  {id:18,phase:'set-out',cat:'programas',title:'Aplicar: Girls Who Invest',desc:'Deadline: 1 de outubro. Sophomore Internship Track = estágio remunerado em partner firms.',urgency:'mid',deadline:'1 Out',duration:3,dt:'único'},
  {id:19,phase:'set-out',cat:'programas',title:'Aplicar: ibRecruit',desc:'Mentoria pro bono de bankers para candidatas diversas. admin@ibrecruit.com.',urgency:'mid',deadline:'Set',duration:1,dt:'único'},
  {id:20,phase:'set-out',cat:'clubes',title:'Aplicar: ~20 clubes em Penn',desc:'Energy Club, Agribusiness, Tart Magazine, Wharton Retail, Penn Sustainability e outros.',urgency:'mid',deadline:'Set',duration:6,dt:'único'},
  {id:21,phase:'set-out',cat:'leitura',title:'Ler The McKinsey Way',desc:'Leitura rápida (~200 págs). Estruturar raciocínio para qualquer entrevista.',urgency:'low',deadline:'Out',duration:5,dt:'único'},
  {id:22,phase:'set-out',cat:'networking',title:'The Walk — networking presencial',desc:'Evento de Penn com recruiters. 30-second pitch preparado.',urgency:'mid',deadline:'Set',duration:3,dt:'único'},
  {id:23,phase:'set-out',cat:'tecnico',title:'Aprofundar technicals — 100+ questões Know Theory',desc:'Foco em LBO basics e enterprise value. Antes dos Superdays de jan-fev.',urgency:'mid',deadline:'Out',duration:2,dt:'semanal'},
  {id:24,phase:'set-out',cat:'tecnico',title:'Acompanhar deal news — 15 min/dia',desc:'Discuss a deal in the news é pergunta clássica. FT, WSJ, Bloomberg Línea.',urgency:'low',deadline:'Contínuo',duration:2,dt:'semanal'},
  {id:25,phase:'set-out',cat:'cv',title:'Explorar TA / tutoria Penn Language Center',desc:'Tutoria de português/espanhol é a opção mais fácil de encaixar na agenda.',urgency:'low',deadline:'Set',duration:2,dt:'único'},
  {id:26,phase:'set-out',cat:'cv',title:'Procurar internship pelo Penn Workday',desc:'Internships dentro da Penn contam como experiência e são mais fáceis de conseguir.',urgency:'low',deadline:'Set',duration:2,dt:'único'},
  {id:27,phase:'nov-fev',cat:'programas',title:'Aplicar: GS Possibilities Series',desc:'Abre em fevereiro. Um dos programas mais competitivos — networking de set/out é o que abre.',urgency:'low',deadline:'Fev',duration:3,dt:'único'},
  {id:28,phase:'nov-fev',cat:'programas',title:'Aplicar: MS Early Insights + Citi Early ID',desc:'MS abre em janeiro, Citi em fevereiro. CV e STAR stories prontos meses antes.',urgency:'low',deadline:'Jan-Fev',duration:4,dt:'único'},
  {id:29,phase:'nov-fev',cat:'leitura',title:'Terminar Investment Banking (Rosenbaum)',desc:'Caps de M&A, DCF detalhado, LBO. Lê em paralelo com prep de Superdays.',urgency:'low',deadline:'Nov',duration:3,dt:'semanal'},
  {id:30,phase:'nov-fev',cat:'leitura',title:'Case in Point (se consulting ativo)',desc:'10-15 cases práticos com parceiro. Só entra se consulting for real.',urgency:'low',deadline:'Nov',duration:10,dt:'único'},
  {id:31,phase:'nov-fev',cat:'programas',title:'Superdays — bulge brackets',desc:'GS, JPM, MS: Superdays para internship junior rodam jan-maio.',urgency:'low',deadline:'Jan-Mai',duration:8,dt:'único'},
  {id:32,phase:'nov-fev',cat:'networking',title:'Bancos brasileiros NY — Itaú, BTG, Safra',desc:'Menor concorrência, sponsorship mais acessível, origem é vantagem competitiva.',urgency:'low',deadline:'Contínuo',duration:1,dt:'semanal'},
  {id:33,phase:'nov-fev',cat:'networking',title:'Continuar coffee chats — 2 por semana',desc:'Não para depois de conseguir o primeiro programa. Alumni lembram de quem faz follow-up.',urgency:'low',deadline:'Contínuo',duration:2,dt:'semanal'},
];
const PL={'jun-jul':'Jun — Jul','agosto':'Agosto','set-out':'Set — Out','nov-fev':'Nov — Fev'};
const PC={'jun-jul':'#E05C5C','agosto':'#D4943A','set-out':'#4CAF8A','nov-fev':'#9B87D4'};
const CL={cv:'CV & Perfil',networking:'Networking',programas:'Programas',clubes:'Clubes',leitura:'Leituras',tecnico:'Prep Técnico'};
const CC={cv:'#C084FC',networking:'#60A5FA',programas:'#9B87D4',clubes:'#4CAF8A',leitura:'#F87171',tecnico:'#D4943A'};
const CHIPS=['Explicar o que é','Como começar','Exemplo prático','Template / modelo','Recursos e links','Estratégia detalhada'];
const KEY='rdb_v3';
function ls(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return{};}}
function ss(){try{localStorage.setItem(KEY,JSON.stringify({done:S.done,rescheduled:S.rescheduled,notes:S.notes,custom:S.custom}));}catch(e){}}
let saved=ls();
let S={done:saved.done||{},rescheduled:saved.rescheduled||{},notes:saved.notes||{},custom:saved.custom||[],pf:'all',cf:'all',sf:'all',modal:null,rPhase:'jun-jul',rNote:'',hChips:[],hNote:'',form:{title:'',desc:'',phase:'jun-jul',cat:'cv',urgency:'mid',deadline:'',duration:'',dt:'único'}};
let nid=1000;
function all(){return[...TASKS,...S.custom];}
function gp(t){return S.rescheduled[t.id]||t.phase;}
function dl(t){if(!t.duration)return null;const h=t.duration<1?Math.round(t.duration*60)+'min':t.duration+'h';return h+(t.dt==='semanal'?'/sem':t.dt==='diário'?'/dia':'');}
let tt;
function toast(m){const e=document.getElementById('toast-el');e.textContent=m;e.style.display='block';clearTimeout(tt);tt=setTimeout(()=>e.style.display='none',2000);}

function render(){
  const tasks=all();
  const td=tasks.filter(t=>S.done[t.id]).length;
  const tu=tasks.filter(t=>t.urgency==='high'&&!S.done[t.id]).length;
  const hl=tasks.filter(t=>!S.done[t.id]&&t.duration&&t.dt==='único').reduce((s,t)=>s+(t.duration||0),0);
  const pct=tasks.length?Math.round(td/tasks.length*100):0;
  const phases=S.pf==='all'?['jun-jul','agosto','set-out','nov-fev']:[S.pf];
  const filtered=tasks.filter(t=>{
    if(S.pf!=='all'&&gp(t)!==S.pf)return false;
    if(S.cf!=='all'&&t.cat!==S.cf)return false;
    if(S.sf==='done'&&!S.done[t.id])return false;
    if(S.sf==='pending'&&S.done[t.id])return false;
    return true;
  });
  let th='';
  phases.forEach(ph=>{
    const pts=filtered.filter(t=>gp(t)===ph);
    if(!pts.length)return;
    const dc=pts.filter(t=>S.done[t.id]).length;
    th+=`<div class="sec-hdr"><div><div class="sec-title" style="color:${PC[ph]}">${PL[ph]}</div><div class="sec-sub">${dc}/${pts.length} concluídas</div></div><div class="sec-cnt">${pts.length}</div></div><div class="tasks">`;
    pts.forEach(t=>{
      const done=!!S.done[t.id];
      const d=dl(t);
      const bw=t.duration?Math.min(100,Math.round((Math.min(t.duration,12)/12)*100)):0;
      const wr=S.rescheduled[t.id]&&S.rescheduled[t.id]!==t.phase;
      const tp=gp(t);
      const nt=S.notes[t.id];
      th+=`<div class="card${done?' done':''}">
        <div class="cb${done?' on':''}" data-a="tog" data-id="${t.id}">${done?'✓':''}</div>
        <div class="body">
          <div class="top-row">
            <span class="ttl${done?' done':''}">${t.title}</span>
            <span class="tag" style="background:${PC[tp]}22;color:${PC[tp]}">${PL[tp]}</span>
            <span class="tag" style="background:${CC[t.cat]}22;color:${CC[t.cat]}">${CL[t.cat]}</span>
            ${d?`<span class="tag" style="background:rgba(155,135,212,0.12);color:#9B87D4">${d}</span>`:''}
            ${wr?'<span class="tag" style="background:rgba(155,135,212,0.12);color:#9B87D4">reagendado</span>':''}
            ${t.custom?'<span class="tag" style="background:rgba(200,169,110,0.12);color:#C8A96E">personalizada</span>':''}
          </div>
          <div class="desc">${t.desc}</div>
          ${d?`<div class="dur-row"><div class="dur-track"><div class="dur-fill" style="width:${bw}%"></div></div><span class="dur-lbl">${d}</span></div>`:''}
          ${nt?`<div class="note-box">Nota: ${nt}</div>`:''}
          <div class="act-row">
            <button class="act-btn" data-a="hlp" data-id="${t.id}">? pedir ajuda</button>
            <button class="act-btn" data-a="res" data-id="${t.id}">⟳ reagendar</button>
            ${t.custom?`<button class="act-btn del" data-a="del" data-id="${t.id}">✕ remover</button>`:''}
            <span class="dl${t.urgency==='high'?' urg':t.urgency==='mid'?' mid':''}">${t.urgency==='high'?'● ':''}${t.deadline||''}</span>
          </div>
        </div>
      </div>`;
    });
    th+='</div>';
  });
  if(!filtered.length)th='<div class="empty">Nenhuma tarefa com estes filtros.</div>';

  const sbp=[['all','Todas','#888'],['jun-jul','Jun — Jul','#E05C5C'],['agosto','Agosto','#D4943A'],['set-out','Set — Out','#4CAF8A'],['nov-fev','Nov — Fev','#9B87D4']];
  const sbc=[['all','Todas','#888'],...Object.entries(CL).map(([k,v])=>[k,v,CC[k]])];
  const sbs=[['all','Todas','#888'],['pending','Pendentes','#555'],['done','Concluídas','#4CAF8A']];

  let mh='';
  if(S.modal){
    const m=S.modal;
    const mt=m.id!=null?all().find(x=>String(x.id)===String(m.id)):null;
    if(m.type==='res'){
      mh=`<div class="overlay" data-a="co">
        <div class="mbox" onclick="event.stopPropagation()">
          <div class="m-title">Reagendar tarefa</div><div class="m-sub">Ajuste a fase desta tarefa no cronograma</div>
          <div class="m-task">${mt?mt.title:''}</div>
          <label class="m-label">Nova fase</label>
          <select class="m-select" id="m-rphase">${Object.entries(PL).map(([v,l])=>`<option value="${v}"${S.rPhase===v?' selected':''}>${l}</option>`).join('')}</select>
          <label class="m-label">Nota (opcional)</label>
          <textarea class="m-textarea" id="m-rnote" placeholder="Por que está reagendando?">${S.rNote}</textarea>
          <div class="m-actions"><button class="m-cancel" data-a="cm">Cancelar</button><button class="m-confirm" data-a="cr">Confirmar</button></div>
        </div></div>`;
    } else if(m.type==='hlp'){
      mh=`<div class="overlay" data-a="co">
        <div class="mbox" onclick="event.stopPropagation()">
          <div class="m-title">Pedir ajuda</div><div class="m-sub">O que você precisa para esta tarefa?</div>
          <div class="m-task">${mt?mt.title:''}</div>
          <label class="m-label">Tipo de ajuda</label>
          <div class="chips">${CHIPS.map(c=>`<button class="chip${S.hChips.includes(c)?' on':''}" data-a="chip" data-chip="${c.replace(/"/g,'')}">${c}</button>`).join('')}</div>
          <label class="m-label">Contexto adicional (opcional)</label>
          <textarea class="m-textarea" id="m-hnote" placeholder="Adicione contexto...">${S.hNote}</textarea>
          <div class="m-actions"><button class="m-cancel" data-a="cm">Cancelar</button><button class="m-confirm" data-a="ch">Enviar ↗</button></div>
        </div></div>`;
    } else if(m.type==='add'){
      const f=S.form;
      mh=`<div class="overlay" data-a="co">
        <div class="mbox" onclick="event.stopPropagation()">
          <div class="m-title">Nova tarefa</div><div class="m-sub">Adicione uma tarefa ao seu cronograma</div>
          <label class="m-label">Título *</label>
          <input class="m-input" id="m-ftitle" value="${f.title}" placeholder="Ex: Aplicar para programa XYZ...">
          <label class="m-label">Descrição</label>
          <textarea class="m-textarea" id="m-fdesc" placeholder="Detalhes, próximos passos...">${f.desc}</textarea>
          <div class="grid2" style="margin-top:10px">
            <div><label class="m-label">Fase</label><select class="m-select" id="m-fphase">${Object.entries(PL).map(([v,l])=>`<option value="${v}"${f.phase===v?' selected':''}>${l}</option>`).join('')}</select></div>
            <div><label class="m-label">Categoria</label><select class="m-select" id="m-fcat">${Object.entries(CL).map(([v,l])=>`<option value="${v}"${f.cat===v?' selected':''}>${l}</option>`).join('')}</select></div>
          </div>
          <div class="grid2" style="margin-top:10px">
            <div><label class="m-label">Urgência</label><select class="m-select" id="m-furg"><option value="high"${f.urgency==='high'?' selected':''}>Alta</option><option value="mid"${f.urgency==='mid'?' selected':''}>Média</option><option value="low"${f.urgency==='low'?' selected':''}>Baixa</option></select></div>
            <div><label class="m-label">Prazo</label><input class="m-input" id="m-fdl" value="${f.deadline}" placeholder="Ex: Jul 31"></div>
          </div>
          <div class="grid2" style="margin-top:10px">
            <div><label class="m-label">Tempo (horas)</label><input class="m-input" id="m-fdur" type="number" min="0.25" step="0.25" value="${f.duration}" placeholder="Ex: 2"></div>
            <div><label class="m-label">Frequência</label><select class="m-select" id="m-fdt"><option value="único"${f.dt==='único'?' selected':''}>Única</option><option value="semanal"${f.dt==='semanal'?' selected':''}>Semanal</option><option value="diário"${f.dt==='diário'?' selected':''}>Diário</option></select></div>
          </div>
          <div class="m-actions"><button class="m-cancel" data-a="cm">Cancelar</button><button class="m-confirm" data-a="ca">Adicionar</button></div>
        </div></div>`;
    }
  }

  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <div><h1>Recruiting <span>Dashboard</span></h1><div class="hdr-sub">Wharton '29 — IB New York — Class of 2029</div></div>
      <div class="stats">
        <div class="stat"><div class="stat-n">${td}</div><div class="stat-l">concluídas</div></div>
        <div class="sdiv"></div>
        <div class="stat"><div class="stat-n">${tasks.length}</div><div class="stat-l">total</div></div>
        <div class="sdiv"></div>
        <div class="stat"><div class="stat-n">${tu}</div><div class="stat-l">urgentes</div></div>
        <div class="sdiv"></div>
        <div class="stat"><div class="stat-n">${hl%1===0?hl+'h':hl.toFixed(1)+'h'}</div><div class="stat-l">restantes</div></div>
        <div class="sdiv"></div>
        <button class="new-btn" data-a="oa">+ nova tarefa</button>
      </div>
    </div>
    <div class="prog-wrap">
      <span class="prog-lbl">${td} / ${tasks.length} tarefas</span>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-pct">${pct}%</span>
    </div>
    <div class="layout">
      <div class="sidebar">
        <div class="ss"><div class="ss-title">Fase</div>${sbp.map(([v,l,c])=>`<button class="sb${S.pf===v?' on':''}" data-a="fpf" data-val="${v}"><span class="dot" style="background:${c}"></span>${l}<span class="cnt">${v==='all'?tasks.length:tasks.filter(t=>gp(t)===v).length}</span></button>`).join('')}</div>
        <div class="ss"><div class="ss-title">Categoria</div>${sbc.map(([v,l,c])=>`<button class="sb${S.cf===v?' on':''}" data-a="fcf" data-val="${v}"><span class="dot" style="background:${c}"></span>${l}</button>`).join('')}</div>
        <div class="ss"><div class="ss-title">Status</div>${sbs.map(([v,l,c])=>`<button class="sb${S.sf===v?' on':''}" data-a="fsf" data-val="${v}"><span class="dot" style="background:${c}"></span>${l}</button>`).join('')}</div>
      </div>
      <div class="main">${th}</div>
    </div>
    ${mh}
  `;
}

document.addEventListener('click',function(e){
  const el=e.target.closest('[data-a]');
  if(!el)return;
  const a=el.dataset.a,id=el.dataset.id;
  if(a==='tog'){S.done[id]=!S.done[id];if(S.done[id])toast('Concluída!');ss();render();}
  else if(a==='fpf'){S.pf=el.dataset.val;render();}
  else if(a==='fcf'){S.cf=el.dataset.val;render();}
  else if(a==='fsf'){S.sf=el.dataset.val;render();}
  else if(a==='res'){S.modal={type:'res',id};S.rPhase=all().find(t=>String(t.id)===id)?.phase||'jun-jul';S.rNote='';render();}
  else if(a==='hlp'){S.modal={type:'hlp',id};S.hChips=[];S.hNote='';render();}
  else if(a==='del'){S.custom=S.custom.filter(t=>String(t.id)!==id);delete S.done[id];ss();toast('Removida.');render();}
  else if(a==='oa'){S.modal={type:'add'};S.form={title:'',desc:'',phase:'jun-jul',cat:'cv',urgency:'mid',deadline:'',duration:'',dt:'único'};render();}
  else if(a==='cm'){S.modal=null;render();}
  else if(a==='co'){S.modal=null;render();}
  else if(a==='chip'){const c=el.dataset.chip;const i=S.hChips.indexOf(c);if(i>=0)S.hChips.splice(i,1);else S.hChips.push(c);render();}
  else if(a==='cr'){const rp=document.getElementById('m-rphase');const rn=document.getElementById('m-rnote');if(rp)S.rescheduled[S.modal.id]=rp.value;if(rn&&rn.value)S.notes[S.modal.id]=rn.value;S.modal=null;ss();toast('Reagendado!');render();}
  else if(a==='ch'){const hn=document.getElementById('m-hnote');const t=all().find(x=>String(x.id)===String(S.modal.id));let msg='Me ajuda com: "'+t?.title+'"';if(S.hChips.length)msg+='. Ajuda: '+S.hChips.join(', ');if(hn&&hn.value)msg+='. Contexto: '+hn.value;S.modal=null;render();prompt('Copie e cole no Claude:',msg);}
  else if(a==='ca'){const ft=document.getElementById('m-ftitle');if(!ft||!ft.value.trim()){toast('Adicione um título!');return;}const fd=document.getElementById('m-fdesc');const fp=document.getElementById('m-fphase');const fc=document.getElementById('m-fcat');const fu=document.getElementById('m-furg');const fdl=document.getElementById('m-fdl');const fdur=document.getElementById('m-fdur');const fdt=document.getElementById('m-fdt');S.custom.push({id:'c'+(nid++),custom:true,phase:fp?fp.value:'jun-jul',cat:fc?fc.value:'cv',urgency:fu?fu.value:'mid',title:ft.value.trim(),desc:fd?fd.value.trim():'',deadline:fdl&&fdl.value?fdl.value:'—',duration:fdur&&fdur.value?parseFloat(fdur.value):null,dt:fdt?fdt.value:'único'});S.modal=null;ss();toast('Tarefa adicionada!');render();}
});

render();
</script>
</body>
</html>
